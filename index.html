<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>RDA Digital — Hero Sandbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: auto; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; }

    #scrub-runway { position: relative; height: 600vh; }
    #stage { position: sticky; top: 0; height: 100vh; width: 100%; overflow: hidden; background: #000; }

    .layer { position: absolute; inset: 0; display: none; }
    body.v1 .layer-v1 { display: flex; align-items: center; justify-content: center; }
    body.v2 .layer-v2, body.v3 .layer-v2 { display: block; }

    /* VARIANT 1 — feathered focal video */
    #video-wrap {
      position: relative; width: clamp(320px, 48vw, 900px); aspect-ratio: 832 / 464; will-change: transform;
      -webkit-mask-image: radial-gradient(ellipse closest-side at center,#000 0%,#000 38%,rgba(0,0,0,0) 82%);
              mask-image: radial-gradient(ellipse closest-side at center,#000 0%,#000 38%,rgba(0,0,0,0) 82%);
      -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    }
    #v1-video { width: 100%; height: 100%; object-fit: cover; }
    .v1-title { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 2; }
    .v1-title h1 { font-size: clamp(34px,6vw,76px); font-weight: 700; letter-spacing: -.02em; text-shadow: 0 2px 50px rgba(0,0,0,.8); }

    /* VARIANT 2 — WebGL liquid glass */
    #gl { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    #gl-fallback { position:absolute; inset:0; display:none; align-items:center; justify-content:center; color:rgba(255,255,255,.6); font-size:13px; }

    .scroll-hint { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.55); z-index: 6; animation: bob 2s ease-in-out infinite; transition: opacity .4s; }
    @keyframes bob { 0%,100%{transform:translate(-50%,0)} 50%{transform:translate(-50%,8px)} }
    #after { position: relative; z-index: 1; background: #000; padding: 120px 24px; text-align: center; color: rgba(255,255,255,.5); }

    #variant-menu { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 12; display: flex; gap: 4px; padding: 4px; background: rgba(16,18,22,.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.12); border-radius: 999px; }
    #variant-menu button { appearance: none; border: 0; cursor: pointer; padding: 7px 16px; border-radius: 999px; font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,.7); background: transparent; transition: all .18s; white-space: nowrap; }
    #variant-menu button.active { background: #fff; color: #111; }

    #controls { position: fixed; top: 16px; right: 16px; z-index: 12; width: 232px; padding: 16px 16px 14px; background: rgba(16,18,22,.78); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.12); border-radius: 12px; font-size: 12px; color: rgba(255,255,255,.85); user-select: none; }
    #controls .title { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: rgba(255,255,255,.4); margin-bottom: 12px; }
    #controls .ctrl { margin-bottom: 14px; } #controls .ctrl:last-child { margin-bottom: 0; }
    #controls .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    #controls .val { font-variant-numeric: tabular-nums; color: #fff; font-weight: 600; }
    #controls input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 4px; background: rgba(255,255,255,.18); outline: none; cursor: pointer; }
    #controls input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.5); }
    #controls input[type=range]::-moz-range-thumb { width: 15px; height: 15px; border-radius: 50%; background: #fff; border: 0; }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }}
  </script>
</head>
<body class="v2">

  <div id="scrub-runway">
    <div id="stage">

      <!-- VARIANT 1 -->
      <div class="layer layer-v1">
        <div id="video-wrap">
          <video id="v1-video" src="media/hero.mp4" muted playsinline preload="auto" webkit-playsinline></video>
        </div>
        <div class="v1-title"><h1>RDA Digital</h1></div>
      </div>

      <!-- VARIANT 2 -->
      <div class="layer layer-v2">
        <canvas id="gl"></canvas>
        <div id="gl-fallback">WebGL unavailable in this browser.</div>
      </div>

    </div>
  </div>

  <!-- hidden source video used as the WebGL texture -->
  <video id="glass-source" src="media/hero.mp4" muted playsinline preload="auto" webkit-playsinline crossorigin="anonymous" style="position:absolute;width:2px;height:2px;opacity:0;pointer-events:none;left:-9999px"></video>

  <div class="scroll-hint" id="hint">Scroll ↓</div>
  <section id="after"><p>— scroll back up and the video rewinds —</p></section>

  <div id="variant-menu">
    <button data-variant="1">1 · Feathered</button>
    <button data-variant="2" class="active">2 · Liquid Glass</button>
    <button data-variant="3">3 · Clear Glass</button>
  </div>

  <div id="controls">
    <div class="title">Hero Sandbox</div>
    <div class="ctrl">
      <div class="row"><span>Background size</span><span class="val" id="szVal">100%</span></div>
      <input id="szSlider" type="range" min="60" max="180" step="1" value="100" />
    </div>
    <div class="ctrl">
      <div class="row"><span>Logo size</span><span class="val" id="lgVal">160%</span></div>
      <input id="lgSlider" type="range" min="60" max="220" step="1" value="160" />
    </div>
    <div class="ctrl">
      <div class="row"><span>Mouse follow</span><span class="val" id="mfVal">25%</span></div>
      <input id="mfSlider" type="range" min="0" max="100" value="25" />
    </div>
    <div class="ctrl">
      <div class="row"><span>Scroll sensitivity</span><span class="val" id="ssVal">4</span></div>
      <input id="ssSlider" type="range" min="1" max="12" step="1" value="4" />
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { SVGLoader } from 'three/addons/loaders/SVGLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const LOGO_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 329">
      <path d="M685.76,256.17S491.47,3.19,491.48,3.18c-.71-.93-1.62-1.68-2.67-2.18-4.38-2.17-9.92.64-10.65,5.51-.31,2.19-.08,252.83-.05,255.13.25,2.02,1.33,3.94,2.99,5.13,1.28.94,2.78,1.45,4.43,1.46,48.35-.06,145.88.04,194.28,0,6.05.06,9.8-7.23,5.95-12.06Z"/>
      <path d="M206.93,256.18l-60.72-79.4c9.52-3.52,19.55-8.95,28.34-17.33,32.91-28.81,33.22-102.36.28-131.48C146.75.12,105.15.24,103.46.24c-.31,0-95.86.02-96.14,0C4.2.29,1.24,2.48.36,5.49.13,6.21.03,6.96.02,7.73,0,7.74.06,183.13,0,183.12c0,0,0,77.61,0,77.61,0,2.29,1.08,4.54,2.91,5.93,1.3,1.01,2.87,1.57,4.58,1.57,0,0,98.14,0,98.14,0,0,.03,95.33,0,95.34.01,6.07.06,9.76-7.24,5.96-12.06ZM146.17,176.77"/>
      <path d="M383.46,20.89C331.62-6.19,295.35,1.36,245.85.03c0,0,.03,260.69.03,260.69,0,.27.02.55.05.82.21,1.95,1.2,3.78,2.73,5.01,1.29,1.05,2.93,1.68,4.73,1.68h46.4c37.33,1.21,101.56-10.11,127.19-61.76,10.08-19.35,15.29-42.95,15.26-70.81,0-53.81-19.78-92.43-58.78-114.78Z"/>
    </svg>`;

    // ---------- shared engine ----------
    const runway = document.getElementById('scrub-runway');
    const hint   = document.getElementById('hint');
    const wrapV1 = document.getElementById('video-wrap');
    const v1video = document.getElementById('v1-video');
    const src    = document.getElementById('glass-source');

    let HALF_PASSES = 4;
    const MAX_FOLLOW = 0.35;
    let FOLLOW = 0.25 * MAX_FOLLOW;     // px-translate factor (variant 1)
    let followNorm = 0.25;              // 0..1 (mouse-follow strength)
    let sizeBg = 1.0;                   // background size multiplier
    let sizeLogo = 1.6;                 // logo size multiplier (default 160%)
    const SCRUB_EASE = 0.12, FOLLOW_EASE = 0.08;

    let variant = 2;
    let duration = 0, targetTime = 0, curTime = 0, ready = false;
    let mx = 0, my = 0, cx = 0, cy = 0;     // px offsets (variant 1)
    let nx = 0, ny = 0;                       // normalized mouse -1..1 (variant 2)

    const pingpong = x => { const m = x % 2; return m < 1 ? m : 2 - m; };
    const activeVideos = () => variant >= 2 ? [src] : [v1video];

    function computeTarget(){
      const scrollable = runway.offsetHeight - window.innerHeight;
      const p = scrollable > 0 ? Math.min(Math.max(window.scrollY / scrollable, 0), 1) : 0;
      targetTime = pingpong(p * HALF_PASSES) * duration;
    }

    // ---------- WebGL (variant 2) ----------
    let gl = { ready:false };
    function initGL(){
      try {
        const canvas = document.getElementById('gl');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 4000);
        camera.position.set(0, 0, 620);

        const pmrem = new THREE.PMREMGenerator(renderer);
        scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

        // video texture
        const vtex = new THREE.VideoTexture(src);
        vtex.colorSpace = THREE.SRGBColorSpace;

        // FULL-BLEED opaque background plane: feathered video focal centered on black.
        // Opaque everywhere => the glass always has a backdrop (black outside the video),
        // so it can never blow out to white where there's no footage behind it.
        const planeMat = new THREE.ShaderMaterial({
          uniforms: {
            map:       { value: vtex },
            uRes:      { value: new THREE.Vector2(1,1) },
            uFocalW:   { value: 0.5 },                 // video width as fraction of viewport
            uVidAspect:{ value: 832/464 },
            uCenter:   { value: new THREE.Vector2(0.5, 0.5) }
          },
          vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
          fragmentShader: `
            uniform sampler2D map; uniform vec2 uRes; uniform float uFocalW; uniform float uVidAspect; uniform vec2 uCenter;
            varying vec2 vUv;
            void main(){
              float aspect = uRes.x / uRes.y;
              float halfW = uFocalW * 0.5;
              float halfH = halfW * aspect / uVidAspect;   // preserve video aspect on screen
              vec2 d = vUv - uCenter;
              vec2 e2 = vec2(d.x/halfW, d.y/halfH);
              float e = length(e2);
              vec2 luv = e2 * 0.5 + 0.5;                    // 0..1 within the video box
              float inBox = step(0.0, luv.x)*step(luv.x,1.0)*step(0.0, luv.y)*step(luv.y,1.0);
              vec3 col = pow(texture2D(map, luv).rgb, vec3(2.2)) * inBox;   // sRGB->linear
              float mask = 1.0 - smoothstep(0.38, 0.82, e);                 // same feather as variant 1
              gl_FragColor = vec4(col * mask, 1.0);                         // opaque black outside
            }`
        });
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(1,1), planeMat);
        plane.position.z = -2;
        scene.add(plane);

        // ---- two glass materials ----
        // Variant 2: lit liquid glass (reflections + clearcoat highlights)
        const matLit = new THREE.MeshPhysicalMaterial({
          color: 0xffffff, metalness: 0, roughness: 0.07,
          transmission: 1.0, thickness: 42, ior: 1.5,
          clearcoat: 1.0, clearcoatRoughness: 0.12,
          envMapIntensity: 1.4, specularIntensity: 1.0,
          attenuationColor: new THREE.Color(0xffffff), attenuationDistance: 4
        });
        // Variant 3: clear glass — no reflections/highlights, visible ONLY via refraction
        const matClear = new THREE.MeshPhysicalMaterial({
          color: 0xffffff, metalness: 0, roughness: 0.0,
          transmission: 1.0, thickness: 78, ior: 1.5,
          clearcoat: 0.0, specularIntensity: 0.0,
          envMapIntensity: 0.0,
          attenuationColor: new THREE.Color(0xffffff), attenuationDistance: 8
        });

        // ---- two geometries (std vs smooth/high-res rounded) ----
        const svg = new SVGLoader().parse(LOGO_SVG);
        const shapes = [];
        svg.paths.forEach(p => SVGLoader.createShapes(p).forEach(s => shapes.push(s)));

        function makeGeo(opts){
          const g = new THREE.ExtrudeGeometry(shapes, opts);
          g.computeBoundingBox();
          const b = g.boundingBox;
          g.translate(-(b.max.x+b.min.x)/2, -(b.max.y+b.min.y)/2, -(b.max.z+b.min.z)/2);
          return g;
        }
        const geoStd = makeGeo({ depth: 60, bevelEnabled: true, bevelThickness: 10, bevelSize: 8,  bevelSegments: 5,  curveSegments: 28 });
        const geoSmooth = makeGeo({ depth: 34, bevelEnabled: true, bevelThickness: 14, bevelSize: 15, bevelSegments: 18, curveSegments: 80 });
        geoStd.computeBoundingBox();
        const logoNativeW = geoStd.boundingBox.max.x - geoStd.boundingBox.min.x;   // ~720

        const meshLit   = new THREE.Mesh(geoStd, matLit);
        const meshClear = new THREE.Mesh(geoSmooth, matClear);
        meshClear.visible = false;

        const logo = new THREE.Group();   // tilt
        logo.add(meshLit); logo.add(meshClear);
        const grp = new THREE.Group();     // drift
        grp.add(logo);
        scene.add(grp);

        gl = { ready:true, renderer, scene, camera, plane, planeMat, logo, grp, meshLit, meshClear, logoNativeW, vtex };
        layoutGL();
        window.addEventListener('resize', layoutGL);
      } catch (e) {
        console.error('WebGL init failed', e);
        document.getElementById('gl').style.display = 'none';
        document.getElementById('gl-fallback').style.display = 'flex';
      }
    }

    function visibleAt(z){
      const dist = gl.camera.position.z - z;
      const h = 2 * Math.tan(THREE.MathUtils.degToRad(gl.camera.fov)/2) * dist;
      return { w: h * gl.camera.aspect, h };
    }

    function layoutGL(){
      if (!gl.ready) return;
      const W = window.innerWidth, H = window.innerHeight;
      gl.renderer.setSize(W, H, false);
      gl.camera.aspect = W / H;
      gl.camera.updateProjectionMatrix();

      // full-bleed background plane (slightly oversized to avoid edge slivers)
      const visP = visibleAt(gl.plane.position.z);
      gl.plane.scale.set(visP.w * 1.04, visP.h * 1.04, 1);
      const u = gl.planeMat.uniforms;
      u.uRes.value.set(W, H);
      u.uFocalW.value = 0.5 * sizeBg;               // background size = video focal width

      const vis = visibleAt(0);
      const logoW = vis.w * 0.5 * 0.98 * sizeLogo;  // logo scales independently
      const s = logoW / gl.logoNativeW;
      gl.meshLit.scale.set(s, -s, s);    // flip SVG y
      gl.meshClear.scale.set(s, -s, s);
    }

    // ---------- main loop ----------
    function tick(){
      if (ready){
        curTime += (targetTime - curTime) * SCRUB_EASE;
        if (Math.abs(targetTime - curTime) < 0.001) curTime = targetTime;
        const t = Math.min(Math.max(curTime, 0), Math.max(duration - 0.04, 0));
        for (const v of activeVideos()) if (Math.abs(v.currentTime - t) > 0.001) v.currentTime = t;
      }
      // eased px offsets (variant 1)
      cx += (mx - cx) * FOLLOW_EASE; cy += (my - cy) * FOLLOW_EASE;
      wrapV1.style.transform = `translate(${cx.toFixed(2)}px, ${cy.toFixed(2)}px) scale(${sizeBg.toFixed(3)})`;

      if (variant >= 2 && gl.ready){
        const u = gl.planeMat.uniforms;
        let tcx, tcy;
        if (variant === 2){
          // logo tilts + drifts toward mouse; background parallax-drifts a touch
          const vis = visibleAt(0);
          const tiltY = nx * 0.5 * followNorm, tiltX = ny * 0.35 * followNorm;
          gl.logo.rotation.y += (tiltY - gl.logo.rotation.y) * 0.07;
          gl.logo.rotation.x += (tiltX - gl.logo.rotation.x) * 0.07;
          const dx = nx * vis.w * 0.04 * followNorm, dy = -ny * vis.h * 0.04 * followNorm;
          gl.grp.position.x += (dx - gl.grp.position.x) * 0.07;
          gl.grp.position.y += (dy - gl.grp.position.y) * 0.07;
          tcx = 0.5 + nx * 0.03 * followNorm; tcy = 0.5 - ny * 0.03 * followNorm;
        } else {
          // variant 3: logo locked perfectly center; background follows the mouse
          gl.logo.rotation.x += (0 - gl.logo.rotation.x) * 0.1;
          gl.logo.rotation.y += (0 - gl.logo.rotation.y) * 0.1;
          gl.grp.position.x += (0 - gl.grp.position.x) * 0.1;
          gl.grp.position.y += (0 - gl.grp.position.y) * 0.1;
          tcx = 0.5 + nx * 0.08 * followNorm; tcy = 0.5 - ny * 0.08 * followNorm;
        }
        u.uCenter.value.x += (tcx - u.uCenter.value.x) * 0.07;
        u.uCenter.value.y += (tcy - u.uCenter.value.y) * 0.07;
        gl.renderer.render(gl.scene, gl.camera);
      }
      requestAnimationFrame(tick);
    }

    // ---------- events ----------
    function onScroll(){ computeTarget(); hint.style.opacity = window.scrollY > 40 ? '0' : '1'; }
    function onMouse(e){
      mx = (e.clientX - innerWidth/2) * FOLLOW;
      my = (e.clientY - innerHeight/2) * FOLLOW;
      nx = (e.clientX / innerWidth) * 2 - 1;
      ny = (e.clientY / innerHeight) * 2 - 1;
    }
    function prime(){ [v1video, src].forEach(v => { const p = v.play(); if (p && p.then) p.then(()=>v.pause()).catch(()=>{}); }); }

    src.addEventListener('loadedmetadata', () => {
      duration = src.duration || 0; computeTarget(); curTime = targetTime; ready = true; prime();
    });
    window.addEventListener('touchstart', prime, { once:true, passive:true });
    window.addEventListener('click', prime, { once:true });

    // variant menu
    document.querySelectorAll('#variant-menu button').forEach(btn => {
      btn.addEventListener('click', () => {
        variant = +btn.dataset.variant;
        document.body.classList.toggle('v1', variant === 1);
        document.body.classList.toggle('v2', variant === 2);
        document.body.classList.toggle('v3', variant === 3);
        document.querySelectorAll('#variant-menu button').forEach(b => b.classList.toggle('active', b === btn));
        if (gl.ready){
          gl.meshLit.visible   = variant === 2;
          gl.meshClear.visible = variant === 3;
          if (variant >= 2) layoutGL();
        }
        const t = Math.min(Math.max(curTime, 0), Math.max(duration - 0.04, 0));
        activeVideos().forEach(v => v.currentTime = t);
      });
    });

    // sliders
    const szS = document.getElementById('szSlider'), lgS = document.getElementById('lgSlider'),
          mfS = document.getElementById('mfSlider'), ssS = document.getElementById('ssSlider');
    const szV = document.getElementById('szVal'), lgV = document.getElementById('lgVal'),
          mfV = document.getElementById('mfVal'), ssV = document.getElementById('ssVal');
    szS.addEventListener('input', () => { sizeBg   = +szS.value/100; szV.textContent = szS.value+'%'; if (gl.ready) layoutGL(); });
    lgS.addEventListener('input', () => { sizeLogo = +lgS.value/100; lgV.textContent = lgS.value+'%'; if (gl.ready) layoutGL(); });
    mfS.addEventListener('input', () => { const pct=+mfS.value; mfV.textContent=pct+'%'; FOLLOW=(pct/100)*MAX_FOLLOW; followNorm=pct/100; });
    ssS.addEventListener('input', () => { HALF_PASSES=+ssS.value; ssV.textContent=ssS.value; computeTarget(); });

    window.addEventListener('scroll', onScroll, { passive:true });
    window.addEventListener('resize', computeTarget);
    window.addEventListener('mousemove', onMouse, { passive:true });

    initGL();
    // optional deep-link: #v1 / #v2 / #v3
    const hv = (location.hash.match(/^#v([123])$/) || [])[1];
    if (hv) { const b = document.querySelector(`#variant-menu button[data-variant="${hv}"]`); if (b) b.click(); }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
