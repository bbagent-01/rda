<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>RDA Digital — Hero Sandbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: auto; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #05070a;
      color: #fff;
    }

    /* Tall scroll runway — its height defines how much scroll drives the video */
    #scrub-runway {
      position: relative;
      height: 600vh;            /* more height = slower, finer scrubbing */
    }

    /* Sticky stage keeps the video pinned full-screen while you scroll the runway */
    #stage {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    #hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* slight darken so overlay text stays readable */
      filter: brightness(0.85);
    }

    /* darkening gradient for legibility */
    #stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(120% 90% at 50% 40%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      z-index: 2;
    }
    .overlay h1 {
      font-size: clamp(40px, 8vw, 96px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      text-shadow: 0 2px 40px rgba(0,0,0,0.4);
    }
    .overlay p {
      margin-top: 18px;
      font-size: clamp(15px, 2vw, 20px);
      color: rgba(255,255,255,0.75);
      max-width: 520px;
    }

    .scroll-hint {
      position: fixed;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      z-index: 3;
      animation: bob 2s ease-in-out infinite;
      transition: opacity 0.4s;
    }
    @keyframes bob { 0%,100%{transform:translate(-50%,0)} 50%{transform:translate(-50%,8px)} }

    /* a content block after the hero so the page reads as "more below" */
    #after {
      position: relative;
      z-index: 1;
      background: #05070a;
      padding: 120px 24px;
      text-align: center;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div id="scrub-runway">
    <div id="stage">
      <video id="hero-video"
             src="media/hero.mp4"
             muted
             playsinline
             preload="auto"
             webkit-playsinline></video>
      <div class="overlay">
        <h1>RDA Digital</h1>
        <p>Scroll to drive the hero. Reaches the end, reverses, ping-pongs — infinitely.</p>
      </div>
    </div>
  </div>

  <div class="scroll-hint" id="hint">Scroll ↓</div>

  <section id="after">
    <p>— sandbox: scroll back up and the video rewinds —</p>
  </section>

  <script>
    const video   = document.getElementById('hero-video');
    const runway  = document.getElementById('scrub-runway');
    const hint    = document.getElementById('hint');

    // How many forward+reverse half-passes happen over the full runway scroll.
    // 4 = forward, reverse, forward, reverse  (i.e. 2 full ping-pongs)
    const HALF_PASSES = 4;
    // Easing toward the scroll target — lower = smoother/laggier, higher = snappier
    const EASE = 0.12;

    let duration = 0;
    let targetTime = 0;
    let currentTime = 0;
    let ready = false;

    // Triangle / ping-pong wave: 0→1→0→1 ...
    function pingpong(x) {
      const m = x % 2;
      return m < 1 ? m : 2 - m;
    }

    function computeTarget() {
      const scrollable = runway.offsetHeight - window.innerHeight;
      const progress = scrollable > 0
        ? Math.min(Math.max(window.scrollY / scrollable, 0), 1)
        : 0;
      const phase = progress * HALF_PASSES;          // 0 .. HALF_PASSES
      targetTime = pingpong(phase) * duration;       // 0 .. duration, ping-ponging
    }

    function tick() {
      if (ready) {
        // ease currentTime toward the scroll-driven target
        currentTime += (targetTime - currentTime) * EASE;
        if (Math.abs(targetTime - currentTime) < 0.001) currentTime = targetTime;
        // clamp into valid range (avoid seeking exactly to duration)
        const t = Math.min(Math.max(currentTime, 0), Math.max(duration - 0.04, 0));
        if (Math.abs(video.currentTime - t) > 0.001) {
          video.currentTime = t;
        }
      }
      requestAnimationFrame(tick);
    }

    function onScroll() {
      computeTarget();
      if (window.scrollY > 40) hint.style.opacity = '0';
      else hint.style.opacity = '1';
    }

    video.addEventListener('loadedmetadata', () => {
      duration = video.duration || 0;
      computeTarget();
      currentTime = targetTime;
      ready = true;
    });

    // Prime decode on iOS/Safari (programmatic seeking needs the pipeline warm)
    function prime() {
      const p = video.play();
      if (p && p.then) p.then(() => video.pause()).catch(() => {});
      window.removeEventListener('touchstart', prime);
      window.removeEventListener('click', prime);
    }
    window.addEventListener('touchstart', prime, { once: true, passive: true });
    window.addEventListener('click', prime, { once: true });

    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', computeTarget);

    requestAnimationFrame(tick);
  </script>
</body>
</html>
