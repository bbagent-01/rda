<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>RDA Digital — Hero Sandbox</title>
  <style>
    :root {
      --bg: #0a0e14;
      --panel: #11161f;
      --line: #1f2733;
      --text: #e8edf4;
      --muted: #8a96a8;
      --accent: #3b82f6;
      --accent-2: #22d3ee;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #16202e 0%, var(--bg) 60%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 24px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 12px var(--accent-2);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    h1 {
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.1;
      margin-bottom: 14px;
      background: linear-gradient(90deg, var(--text), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: var(--muted); font-size: 16px; line-height: 1.6; max-width: 460px; margin: 0 auto; }
    .meta {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .meta span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge"><span class="dot"></span> Sandbox Live</div>
    <h1>RDA Digital — Hero Sandbox</h1>
    <p>This subdomain is wired up and deploying automatically. Ready for hero experimentation — drop in the first concept whenever you are.</p>
    <div class="meta">rda.bbase.ai · <span>auto-deploy active</span></div>
  </div>
</body>
</html>
