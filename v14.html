<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>RDA Digital — Hero Sandbox (v14 · Ribbons II)</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { overflow-x: hidden; }
    #fx { position: fixed; inset: 0; width: 100%; height: 100%; display: block; z-index: 0; }
    #vignette { position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(120% 95% at 50% 42%, rgba(0,0,0,0) 45%, rgba(0,0,0,0.65) 100%); }
    .hero-copy { position: fixed; inset: 0; z-index: 5; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 0 7vw; pointer-events: none; }
    .hero-copy .sentence { text-align: center; max-width: 14ch; }
    .hero-copy .sub { margin-top: 26px; font-size: clamp(15px, 1.6vw, 21px); font-weight: 500;
      color: rgba(255,255,255,0.68); max-width: 52ch; line-height: 1.5; text-shadow: 0 0 30px #000; }
  </style>
  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" }}
  </script>
</head>
<body class="v14">

  <canvas id="fx"></canvas>
  <div id="vignette"></div>

  <div class="hero-copy" id="copy">
    <p class="sentence" data-sentence="Victory Never Sounded So Good."></p>
    <p class="sub reveal">AI can play every instrument. Great leaders ensure the entire orchestra performs in harmony.</p>
  </div>

  <div class="scroll-hint" id="hint">Scroll ↓</div>

  <div id="controls">
    <div class="title-row"><span class="title">Conductor · Ribbons II</span><button id="refreshBtn">↻ Refresh</button></div>
    <div class="ctrl"><div class="row"><span>Particles</span><span class="val" id="rbVal">24k</span></div><input id="rbSlider" type="range" min="8" max="48" step="2" value="24" /></div>
    <div class="ctrl"><div class="row"><span>Flow speed</span><span class="val" id="spVal">100%</span></div><input id="spSlider" type="range" min="20" max="300" step="5" value="100" /></div>
    <div class="ctrl"><div class="row"><span>Chaos (idle)</span><span class="val" id="chVal">55%</span></div><input id="chSlider" type="range" min="0" max="100" step="1" value="55" /></div>
    <div class="ctrl"><div class="row"><span>Conduct strength</span><span class="val" id="cdVal">120%</span></div><input id="cdSlider" type="range" min="0" max="300" step="5" value="120" /></div>
    <div class="ctrl"><div class="row"><span>Amplitude</span><span class="val" id="amVal">100%</span></div><input id="amSlider" type="range" min="30" max="250" step="5" value="100" /></div>
    <div class="ctrl"><div class="row"><span>Crescendo (scroll)</span><span class="val" id="crVal">120%</span></div><input id="crSlider" type="range" min="0" max="300" step="5" value="120" /></div>
    <div class="ctrl"><div class="row"><span>Embers</span><span class="val" id="thVal">100%</span></div><input id="thSlider" type="range" min="0" max="250" step="5" value="100" /></div>
    <div class="ctrl"><div class="row"><span>Glow</span><span class="val" id="glVal">100%</span></div><input id="glSlider" type="range" min="0" max="200" step="5" value="100" /></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { mountSections, mountNav } from './sections.js';
    mountSections(); mountNav('14');

    // ---------- copy reveal (same word-stagger language as the other pages) ----------
    document.querySelectorAll('#copy [data-sentence]').forEach(p => {
      p.dataset.sentence.split(/\s+/).forEach(w => {
        const s = document.createElement('span');
        s.className = 'word reveal'; s.textContent = w;
        p.appendChild(s); p.appendChild(document.createTextNode(' '));
      });
    });
    const revealItems = [...document.querySelectorAll('#copy .reveal')];
    revealItems.forEach((el, i) => el.style.transitionDelay = (i * 70) + 'ms');
    setTimeout(() => revealItems.forEach(el => el.classList.add('in')), 900);

    // ---------- controls ----------
    // rb = particle count (in thousands), sp = flow speed, ch = idle chaos/turbulence,
    // cd = conduct strength, am = amplitude, cr = crescendo (scroll), th = ember amount, gl = glow
    const $ = id => document.getElementById(id);
    const sliders = { rb:$('rbSlider'), sp:$('spSlider'), ch:$('chSlider'), cd:$('cdSlider'), am:$('amSlider'), cr:$('crSlider'), th:$('thSlider'), gl:$('glSlider') };
    const vals    = { rb:$('rbVal'),    sp:$('spVal'),    ch:$('chVal'),    cd:$('cdVal'),    am:$('amVal'),    cr:$('crVal'),    th:$('thVal'),    gl:$('glVal') };
    const cfg = { rb:24, sp:1, ch:0.55, cd:1.2, am:1, cr:1.2, th:1, gl:1 };
    const fmt = { rb:v=>v+'k', sp:v=>v+'%', ch:v=>v+'%', cd:v=>v+'%', am:v=>v+'%', cr:v=>v+'%', th:v=>v+'%', gl:v=>v+'%' };
    const scale = { rb:v=>+v, sp:v=>v/100, ch:v=>v/100, cd:v=>v/100, am:v=>v/100, cr:v=>v/100, th:v=>v/100, gl:v=>v/100 };

    const KEY = 'rda_v14_ctrls';
    let suppress = true;
    function persist(){ if (suppress) return; const o={}; Object.keys(sliders).forEach(k=>o[k]=sliders[k].value); try{ localStorage.setItem(KEY, JSON.stringify(o)); }catch(e){} }
    Object.keys(sliders).forEach(k => {
      sliders[k].addEventListener('input', () => {
        cfg[k] = scale[k](sliders[k].value); vals[k].textContent = fmt[k](sliders[k].value);
        if (k === 'rb') rebuild();   // changing particle count rebuilds the cloud
        persist();
      });
    });
    try { const o = JSON.parse(localStorage.getItem(KEY)); if (o) Object.keys(o).forEach(k => { if (sliders[k]) { sliders[k].value = o[k]; sliders[k].dispatchEvent(new Event('input')); } }); } catch(e){}
    suppress = false;
    $('refreshBtn').addEventListener('click', () => location.reload());

    // ---------- scene ----------
    const canvas = $('fx');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 1);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
    camera.position.set(0, 0, 10);

    // world size at z=0
    function worldSize(){ const h = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov)/2) * camera.position.z; return { w: h * camera.aspect, h }; }

    const COLORS = ['#d73624', '#ff6a34', '#e8484f', '#ff5a8a', '#f0457a', '#c0277e', '#96077e'];   // warm RDA reds/oranges/pinks/magentas — no blue
    const PALETTE = COLORS.map(c => new THREE.Color(c));

    // ---------------------------------------------------------------------------
    // PARTICLE SOUNDWAVE
    // Thousands of fine soft points flow horizontally and stack into undulating
    // soundwave ridges. The same multi-sine displacement (personal + shared waves)
    // that drove the old ribbons now drives each particle's Y. A dense horizontal
    // band forms the wave body; a thinner upper scatter drifts above like embers.
    // Each point gets a soft round additive glow via gl_PointCoord in the fragment.
    // ---------------------------------------------------------------------------
    const VERT = `
      precision highp float;
      uniform float uTime, uAmp, uH, uPixelRatio, uConduct, uChaos, uEmber, uBandH, uWorldW;
      uniform vec2  uMouse;
      attribute float aX;        // base x across the field (-0.5..0.5 of width)
      attribute float aRow;      // -1..1 position within the band (0 = crest centreline)
      attribute float aLayer;    // depth layer 0..1
      attribute float aSeed;     // per-particle random
      attribute float aEmber;    // 0 = body particle, 1 = ember (upper scatter)
      attribute float aSize;     // base point size multiplier
      attribute vec3  aColor;    // per-particle base colour
      varying vec3  vColor;
      varying float vBright;
      varying float vEmber;

      // cheap hash-based smooth value for drift
      float n1(float x){ return sin(x*12.9898)*43758.5453; }

      void main(){
        float x = aX * uWorldW;            // world x across the screen
        float t = uTime;

        // ---- the soundwave: personal + shared multi-sine (warm-stacked ridges) ----
        float fP = 0.85 + fract(aSeed*1.7)*0.9;          // personal frequency per particle group
        float sP = 0.5  + fract(aSeed*3.1)*0.7;          // personal speed
        float ph = aSeed * 6.2831;
        float personal = sin(x*fP + t*sP + ph) + 0.5*sin(x*fP*2.3 + t*sP*1.37 + ph*2.1);
        float shared   = sin(x*1.0 + t*0.6)    + 0.5*sin(x*1.71 + t*0.6*1.21);
        float w = mix(personal, shared, uH);             // harmony blends toward the shared wave
        float crest = uAmp * w * 0.6;                    // the ridge line for this column

        // ---- stack the band around the ridge line; rows fan out vertically ----
        float band = aRow * uBandH * (aEmber > 0.5 ? 2.4 : 1.0);   // embers reach higher
        float y = crest + band;

        // ---- gentle per-particle drift / turbulence so the cloud flows (idle chaos) ----
        float drift = uChaos * (aEmber > 0.5 ? 0.55 : 0.28);
        y += sin(x*1.9 + t*(0.7+sP) + aSeed*9.0) * 0.10 * drift;
        y += sin(t*0.9 + aSeed*40.0) * 0.06 * drift;       // slow vertical shimmer
        x += sin(t*0.5 + aSeed*20.0 + aRow*3.0) * 0.08 * drift;  // lateral sway

        // ---- mouse conduct: lift / swell particles near the cursor column ----
        float infl = exp(-pow(x - uMouse.x, 2.0) / 2.6);
        y += infl * (uMouse.y - crest) * uConduct * 0.55 * (1.0 - 0.4*aEmber);
        float swell = 1.0 + infl * uConduct * 0.9;         // points puff up under the baton

        float z = (aLayer - 0.5) * 2.4;                    // spread across depth for parallax layering

        vec4 mv = modelViewMatrix * vec4(x, y, z, 1.0);
        gl_Position = projectionMatrix * mv;

        // ---- brightness: hottest on the crest centreline, dimmer toward band edges ----
        float toCrest = 1.0 - clamp(abs(aRow), 0.0, 1.0);   // 1 at centreline -> 0 at band edge
        float bodyBright = 0.35 + 0.85 * toCrest;
        float emberBright = mix(0.45, 0.0, clamp(abs(aRow), 0.0, 1.0)) * uEmber;  // embers fade upward
        vBright = mix(bodyBright, emberBright, aEmber);
        vEmber = aEmber;
        vColor = aColor;

        // ---- size: bigger/brighter near crest, tiny for high embers; perspective attenuated ----
        float sz = aSize * mix(1.0, 0.55, aEmber) * (0.55 + 0.9 * toCrest) * swell;
        gl_PointSize = sz * uPixelRatio * (300.0 / max(-mv.z, 0.1));
      }`;

    const FRAG = `
      precision highp float;
      uniform float uGlow;
      varying vec3  vColor;
      varying float vBright;
      varying float vEmber;
      void main(){
        // soft round glow: bright core -> transparent edge
        vec2 c = gl_PointCoord - vec2(0.5);
        float d = length(c);
        if (d > 0.5) discard;
        float core = smoothstep(0.5, 0.0, d);          // 0 at rim, 1 at centre
        float soft = pow(core, 1.6);                   // fibrous soft falloff
        float a = soft * vBright * uGlow;
        // warm hot core lift on the brightest body particles
        vec3 col = vColor + vec3(0.30, 0.12, 0.05) * pow(core, 3.0) * vBright * (1.0 - vEmber);
        gl_FragColor = vec4(col * (0.6 + 0.7*core), a);
      }`;

    let points = null;
    const uniforms = {
      uTime:{value:0}, uAmp:{value:1}, uH:{value:0}, uPixelRatio:{value:Math.min(devicePixelRatio,2)},
      uConduct:{value:1.2}, uChaos:{value:0.55}, uEmber:{value:1}, uBandH:{value:0.34},
      uWorldW:{value:14}, uMouse:{value:new THREE.Vector2(0,0)}, uGlow:{value:1}
    };

    function rebuild(){
      if (points){ scene.remove(points); points.geometry.dispose(); points.material.dispose(); points = null; }
      const ws = worldSize();
      uniforms.uWorldW.value = ws.w * 1.5;               // overscan so the field fills the edges

      const N = Math.round(cfg.rb * 1000);
      const EMBER_FRAC = 0.30;                            // share of particles that are upper-scatter embers
      const aX = new Float32Array(N), aRow = new Float32Array(N), aLayer = new Float32Array(N);
      const aSeed = new Float32Array(N), aEmber = new Float32Array(N), aSize = new Float32Array(N);
      const aColor = new Float32Array(N * 3);

      for (let i = 0; i < N; i++){
        const ember = Math.random() < EMBER_FRAC ? 1 : 0;
        aX[i]    = Math.random() - 0.5;                  // even horizontal spread
        aLayer[i]= Math.random();
        aSeed[i] = Math.random();
        aEmber[i]= ember;

        if (ember){
          // embers drift ABOVE the band: biased upward, sparse, small
          aRow[i] = 0.25 + Math.random() * Math.random() * 1.4;   // squared bias -> sparser higher up
          aSize[i] = 1.0 + Math.random() * 1.6;
        } else {
          // body particles cluster toward the crest centreline (denser/brighter middle)
          // triangular-ish distribution: mean of two uniforms hugs 0
          const r = (Math.random() + Math.random() - 1.0);        // -1..1, peaked at 0
          aRow[i] = r;
          aSize[i] = 1.6 + Math.random() * 2.2;
        }

        // colour shifts across x (hot reds/oranges -> magenta) plus brightness on the crest
        const cpos = (aX[i] + 0.5) * (PALETTE.length - 1) + (Math.random()-0.5)*0.9;
        const ci = Math.max(0, Math.min(PALETTE.length - 2, Math.floor(cpos)));
        const f = Math.max(0, Math.min(1, cpos - ci));
        const c0 = PALETTE[ci], c1 = PALETTE[ci + 1];
        aColor[i*3]   = c0.r + (c1.r - c0.r) * f;
        aColor[i*3+1] = c0.g + (c1.g - c0.g) * f;
        aColor[i*3+2] = c0.b + (c1.b - c0.b) * f;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(N * 3), 3));  // dummy; real pos built in shader
      geo.setAttribute('aX',     new THREE.BufferAttribute(aX, 1));
      geo.setAttribute('aRow',   new THREE.BufferAttribute(aRow, 1));
      geo.setAttribute('aLayer', new THREE.BufferAttribute(aLayer, 1));
      geo.setAttribute('aSeed',  new THREE.BufferAttribute(aSeed, 1));
      geo.setAttribute('aEmber', new THREE.BufferAttribute(aEmber, 1));
      geo.setAttribute('aSize',  new THREE.BufferAttribute(aSize, 1));
      geo.setAttribute('aColor', new THREE.BufferAttribute(aColor, 3));
      geo.boundingSphere = new THREE.Sphere(new THREE.Vector3(0,0,0), 100);   // never frustum-cull

      const mat = new THREE.ShaderMaterial({
        vertexShader: VERT, fragmentShader: FRAG, uniforms,
        transparent: true, depthWrite: false, depthTest: false,
        blending: THREE.AdditiveBlending
      });
      points = new THREE.Points(geo, mat);
      scene.add(points);
    }

    function layout(){
      renderer.setSize(innerWidth, innerHeight, false);
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      uniforms.uPixelRatio.value = Math.min(devicePixelRatio, 2);
      rebuild();
    }
    window.addEventListener('resize', layout);
    layout();

    // ---------- conducting state ----------
    let mxW = 0, myW = 0;          // eased mouse in world units
    let tmxW = 0, tmyW = 0;        // target
    let harmony = 0;               // builds while you conduct, decays when idle
    let lastMX = 0, lastMY = 0, mouseSpeed = 0;
    window.addEventListener('mousemove', e => {
      const ws = worldSize();
      tmxW = (e.clientX / innerWidth - 0.5) * ws.w;
      tmyW = -(e.clientY / innerHeight - 0.5) * ws.h;
      mouseSpeed = Math.min(Math.hypot(e.clientX - lastMX, e.clientY - lastMY), 80);
      lastMX = e.clientX; lastMY = e.clientY;
    }, { passive: true });

    // scroll: crescendo + copy fade
    const copy = $('copy'), hint = $('hint');
    let scrollP = 0;
    function onScroll(){
      const sc = document.documentElement.scrollHeight - innerHeight;
      scrollP = sc > 0 ? Math.min(Math.max(scrollY / sc, 0), 1) : 0;
      hint.style.opacity = scrollY > 40 ? '0' : '1';
      const wp = Math.min(Math.max(scrollY / (innerHeight * 0.6), 0), 1);
      copy.style.transform = `translateY(${(-wp * 70).toFixed(1)}px)`;
      copy.style.opacity = (1 - wp).toFixed(3);
    }
    window.addEventListener('scroll', onScroll, { passive: true });

    const clock = new THREE.Clock();
    function tick(){
      const t = clock.getElapsedTime();
      // conducting builds harmony; stillness lets it dissolve back to chaos
      if (mouseSpeed > 2) harmony = Math.min(harmony + 0.012 * cfg.cd, 1);
      else harmony = Math.max(harmony - 0.004, 0);
      mouseSpeed *= 0.9;
      mxW += (tmxW - mxW) * 0.04;  // slow lazy baton
      myW += (tmyW - myW) * 0.04;

      const idleH = (1 - cfg.ch) * 0.5;                     // chaos slider sets the idle floor
      const h = Math.min(idleH + harmony * (1 - idleH), 1);
      const amp = cfg.am * (1 + scrollP * cfg.cr * 1.6);
      const spd = cfg.sp * (1 + scrollP * cfg.cr * 0.7);

      uniforms.uTime.value    = t * spd;
      uniforms.uAmp.value     = amp;
      uniforms.uH.value       = h;
      uniforms.uConduct.value = cfg.cd;
      // crescendo also energises the cloud: more turbulence + spread under scroll
      uniforms.uChaos.value   = cfg.ch * (1 + scrollP * cfg.cr * 0.8);
      uniforms.uEmber.value   = cfg.th;
      uniforms.uBandH.value   = 0.34 * (1 + scrollP * cfg.cr * 0.5);
      uniforms.uMouse.value.set(mxW, myW);
      uniforms.uGlow.value    = cfg.gl;

      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
